name: Go Test

on:
  push:
    branches: [main]
    paths:
      - 'lambda_go/**'
      - '.github/workflows/go-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lambda_go/**'
      - '.github/workflows/go-test.yml'

jobs:
  test:
    name: Go ユニットテスト
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: lambda_go

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: lambda_go/go.mod
          cache-dependency-path: lambda_go/go.sum

      - name: go vet（静的解析）
        run: go vet ./...

      - name: go test
        run: go test ./... -v -count=1 -coverprofile=coverage.out -covermode=atomic
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lambda_go/coverage.out
          flags: go
          fail_ci_if_error: false
