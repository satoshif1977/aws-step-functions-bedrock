name: Go Test

on:
  push:
    branches: [main]
    paths:
      - 'lambda_go/**'
      - '.github/workflows/go-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lambda_go/**'
      - '.github/workflows/go-test.yml'

jobs:
  test:
    name: Go ユニットテスト
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: lambda_go

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: lambda_go/go.mod
          cache-dependency-path: lambda_go/go.sum

      - name: go vet（静的解析）
        run: go vet ./...

      - name: go test - step1_transform
        run: go test ./step1_transform/... -v -count=1

      - name: go test - step2_format
        run: go test ./step2_format/... -v -count=1
