name: Terraform CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  terraform:
    name: Terraform 構文チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: terraform fmt
        run: terraform fmt --check -recursive

      - name: terraform init（バックエンドなし）
        run: terraform -chdir=environments/dev init -backend=false -input=false

      - name: terraform validate
        run: terraform -chdir=environments/dev validate

  security:
    name: Checkov セキュリティスキャン
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false
          skip_check: >-
            CKV_AWS_117,CKV_AWS_272,
            CKV_AWS_116,CKV_AWS_115,
            CKV_AWS_173,CKV_AWS_158,
            CKV_AWS_338,CKV_AWS_290,
            CKV_AWS_355,CKV_AWS_284,
            CKV_AWS_285
          output_format: cli
